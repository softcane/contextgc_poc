<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ContextGC demo output</title>
  <desc id="desc">Terminal-style example showing recency losing the bug report and barrier keeping it.</desc>
  <rect width="1200" height="720" fill="#f4f0e8"/>
  <rect x="70" y="60" width="1060" height="600" rx="18" fill="#18181b"/>
  <rect x="70" y="60" width="1060" height="48" rx="18" fill="#23232a"/>
  <circle cx="110" cy="84" r="8" fill="#ff5f57"/>
  <circle cx="138" cy="84" r="8" fill="#febc2e"/>
  <circle cx="166" cy="84" r="8" fill="#28c840"/>
  <text x="210" y="90" fill="#d4d4d8" font-family="Menlo, Monaco, monospace" font-size="20">python -m contextgc_barrier.demo</text>

  <text x="110" y="150" fill="#60a5fa" font-family="Menlo, Monaco, monospace" font-size="28" font-weight="700">=== RECENCY ===</text>
  <text x="110" y="190" fill="#f5f5f5" font-family="Menlo, Monaco, monospace" font-size="22">Recall score: 57%</text>
  <text x="110" y="225" fill="#f5f5f5" font-family="Menlo, Monaco, monospace" font-size="22">Kept original bug report: False</text>
  <text x="110" y="260" fill="#fca5a5" font-family="Menlo, Monaco, monospace" font-size="22">Summary: process_batch(); numpy cache; src/batch_processor.py; cache.clear().</text>

  <text x="110" y="340" fill="#34d399" font-family="Menlo, Monaco, monospace" font-size="28" font-weight="700">=== BARRIER ===</text>
  <text x="110" y="380" fill="#f5f5f5" font-family="Menlo, Monaco, monospace" font-size="22">Recall score: 100%</text>
  <text x="110" y="415" fill="#f5f5f5" font-family="Menlo, Monaco, monospace" font-size="22">Kept original bug report: True</text>
  <text x="110" y="450" fill="#86efac" font-family="Menlo, Monaco, monospace" font-size="22">Summary: process_batch(); batch_size &gt; 1000; numpy cache; v2.3;</text>
  <text x="110" y="485" fill="#86efac" font-family="Menlo, Monaco, monospace" font-size="22">src/batch_processor.py; 200MB; cache.clear().</text>

  <text x="110" y="565" fill="#d4d4d8" font-family="Menlo, Monaco, monospace" font-size="20">Same budget. Different outcome.</text>
  <text x="110" y="600" fill="#d4d4d8" font-family="Menlo, Monaco, monospace" font-size="20">Barrier keeps the old bug report alive when recency drops it.</text>
</svg>
