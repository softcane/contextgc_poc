  <text x="96" y="420" fill="#4f493f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Task</text>
  <text x="336" y="420" fill="#4f493f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Window</text>
  <text x="458" y="420" fill="#1f7a5a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Barrier</text>
  <text x="584" y="420" fill="#b46916" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Score Only</text>
  <text x="734" y="420" fill="#3f5d7a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Summary80</text>
  <text x="886" y="420" fill="#4f493f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">B - SO</text>
  <text x="978" y="420" fill="#4f493f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">B - S80</text>
  <text x="1064" y="420" fill="#4f493f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Result</text>

