  <text x="1064" y="473" fill="#1f7a5a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">Barrier win</text>

  <rect x="76" y="488" width="1048" height="40" fill="#fbf7f0"/>
  <text x="96" y="513" fill="#26231f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Debugging</text>
  <text x="336" y="513" fill="#5f584e" font-family="Menlo, Monaco, monospace" font-size="15">16384</text>
