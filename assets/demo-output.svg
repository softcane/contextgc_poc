  <text x="458" y="553" fill="#1f7a5a" font-family="Menlo, Monaco, monospace" font-size="15">0.886</text>
  <text x="584" y="553" fill="#b46916" font-family="Menlo, Monaco, monospace" font-size="15">0.714</text>
