<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">ContextGC benchmark summary</title>
  <desc id="desc">Professional summary of the latest ContextGC benchmark. Barrier beats summary80 in all eight task and window conditions, while the comparison against score_only is mixed.</desc>

  <rect width="1200" height="860" fill="#f5f1ea"/>
  <rect x="28" y="28" width="1144" height="804" rx="24" fill="#fffdf9" stroke="#ddd4c6" stroke-width="2"/>

  <text x="56" y="78" fill="#1d1b18" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="700">ContextGC Benchmark Summary</text>
  <text x="56" y="108" fill="#61594f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="18">Latest published run: benchmark/results/latest</text>
  <text x="56" y="134" fill="#61594f" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="18">Qwen 3.5 • 240 runs • 4 task families • 2 prompt budgets • 10 seeds per condition</text>

  <rect x="56" y="164" width="248" height="110" rx="18" fill="#eaf5ef" stroke="#c9ded0" stroke-width="2"/>
  <text x="76" y="198" fill="#1b5c44" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Barrier vs Summary80</text>
  <text x="76" y="236" fill="#1f7a5a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">8 / 8</text>
  <text x="76" y="260" fill="#385247" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Barrier has the higher mean score in every</text>
  <text x="76" y="280" fill="#385247" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">task-window condition.</text>

  <rect x="324" y="164" width="248" height="110" rx="18" fill="#fff3e3" stroke="#ead8b6" stroke-width="2"/>
  <text x="344" y="198" fill="#8a5a12" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Barrier vs Score Only</text>
  <text x="344" y="236" fill="#b46916" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="700">4 W / 2 T / 2 L</text>
  <text x="344" y="260" fill="#5f4b2b" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">The barrier story is mixed at larger windows.</text>

  <rect x="592" y="164" width="248" height="110" rx="18" fill="#edf2f7" stroke="#d5dce6" stroke-width="2"/>
  <text x="612" y="198" fill="#39526b" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Anchor Retention</text>
  <text x="612" y="236" fill="#2d4f73" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="700">Barrier 100%</text>
  <text x="612" y="262" fill="#5a6673" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Summary80 0% in all eight conditions.</text>

  <rect x="860" y="164" width="284" height="110" rx="18" fill="#f8e9e7" stroke="#e7c8c1" stroke-width="2"/>
  <text x="880" y="198" fill="#8d3f34" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Main Caveat</text>
  <text x="880" y="226" fill="#69413a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Scorer agreement is still weak in</text>
  <text x="880" y="248" fill="#69413a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">customer support and multi-step coding.</text>
  <text x="880" y="270" fill="#69413a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">That limits the strength of the</text>
  <text x="880" y="292" fill="#69413a" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">barrier-specific claim.</text>

  <rect x="56" y="304" width="1088" height="490" rx="20" fill="#fffdf9" stroke="#e4dbce" stroke-width="2"/>
  <text x="76" y="342" fill="#1d1b18" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Mean Score By Task And Window</text>
  <text x="76" y="368" fill="#6d655b" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">Same seeded conversations, same model, same prompt budget. Only the memory policy changes.</text>

