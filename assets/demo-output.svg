  <text x="76" y="814" fill="#6d655b" font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif" font-size="15">Barrier wins cleanly against Summary80. The stronger barrier-vs-score_only claim remains mixed.</text>
